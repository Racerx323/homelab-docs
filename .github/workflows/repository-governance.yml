---
name: Repository Actions governance

'on':
  schedule:
    - cron: '23 7 * * 1'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/repository-governance.yml'
      - '.github/workflows/reusable-validation.yml'
      - 'config/repository-actions-policy.yaml'
      - 'scripts/audit-repository-actions.sh'

permissions:
  contents: read

jobs:
  audit:
    name: Report policy drift
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.REPOSITORY_AUDIT_TOKEN || github.token }}
    steps:
      - name: Check out governance repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install audit tools
        run: |
          mkdir -p "${RUNNER_TEMP}/audit-bin"
          GOBIN="${RUNNER_TEMP}/audit-bin" \
            go install github.com/mikefarah/yq/v4@v4.53.3
          GOBIN="${RUNNER_TEMP}/audit-bin" \
            go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "${RUNNER_TEMP}/audit-bin" >> "${GITHUB_PATH}"

      - name: Audit managed repositories
        run: scripts/audit-repository-actions.sh --remote
