---
name: Mermaid

'on':
  pull_request:
    paths:
      - '**/*.mermaid'
      - '**/*.mmd'
      - '.github/workflows/mermaid.yml'
      - '.mermaid-version'
      - 'scripts/mermaid-tool.sh'
  push:
    branches: [main]
    paths:
      - '**/*.mermaid'
      - '**/*.mmd'
      - '.github/workflows/mermaid.yml'
      - '.mermaid-version'
      - 'scripts/mermaid-tool.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: '26.4.0'

      - name: Install pinned Mermaid CLI
        shell: bash
        run: |
          MERMAID_VERSION="$(tr -d '[:space:]' < .mermaid-version)"
          npm install --global --allow-scripts=puppeteer \
            "@mermaid-js/mermaid-cli@${MERMAID_VERSION}"

      - name: Validate Mermaid diagrams
        run: scripts/mermaid-tool.sh validate
